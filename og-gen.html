<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG Image Generator</title>
<link href="https://api.fontshare.com/v2/css?f[]=neue-montreal@400&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0a0a0a; width: 1200px; height: 630px; overflow: hidden; }
  .og-card {
    width: 1200px;
    height: 630px;
    background: #0a0a0a;
    position: relative;
    overflow: hidden;
    font-family: 'Neue Montreal', -apple-system, sans-serif;
    color: #f0f0f0;
    font-weight: 400;
  }
  .mesh {
    position: absolute;
    inset: -10% -5%;
    pointer-events: none;
    z-index: 0;
    filter: blur(60px);
    background:
      radial-gradient(ellipse at 25% 30%, rgba(100, 70, 220, 0.55), transparent 50%),
      radial-gradient(ellipse at 72% 62%, rgba(255, 120, 110, 0.42), transparent 50%),
      radial-gradient(ellipse at 55% 28%, rgba(140, 90, 230, 0.38), transparent 45%),
      radial-gradient(ellipse at 78% 38%, rgba(255, 150, 120, 0.28), transparent 55%);
  }
  .content {
    position: absolute;
    inset: 0;
    z-index: 2;
  }
  .status {
    position: absolute;
    top: 64px;
    left: 80px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    background: rgba(255, 255, 255, 0.04);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 15px;
    color: rgba(240, 240, 240, 0.88);
    letter-spacing: 0.01em;
  }
  .status .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 12px rgba(74, 222, 128, 0.8);
  }
  .main {
    position: absolute;
    left: 80px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  h1 {
    margin: 0;
    font-size: 88px;
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.03em;
    color: #ffffff;
    white-space: nowrap;
  }
  .sub {
    margin: 0;
    font-size: 28px;
    color: rgba(240, 240, 240, 0.78);
    letter-spacing: -0.01em;
    line-height: 1.3;
    max-width: 900px;
  }
  .footer {
    position: absolute;
    right: 80px;
    bottom: 48px;
    font-size: 22px;
    color: #ffffff;
    letter-spacing: 0.01em;
    z-index: 3;
  }
</style>
</head>
<body>
  <div class="og-card" id="card">
    <div class="mesh"></div>
    <div class="content">
      <div class="status"><span class="dot"></span>Open to product design roles</div>
      <div class="main">
        <h1>AI-first product designer.</h1>
        <p class="sub">iF &amp; Red Dot winner. Shaping AI products with taste.</p>
      </div>
      <div class="footer">Chang Mou</div>
    </div>
  </div>
</body>
</html>
